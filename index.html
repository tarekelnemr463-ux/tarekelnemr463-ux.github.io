<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;overflow:hidden}
#wrap{width:100vw;height:100vh;position:relative;overflow:hidden}

/* ===== تحسين الموبايل ===== */
@media (max-width: 768px){
  #login-screen h2{font-size:22px}
  #login-screen .sub{font-size:13px}
  #pass{width:140px;font-size:15px;padding:10px}
  #open-btn{padding:10px 18px;font-size:14px}

  #count-num{font-size:90px}
  #count-label{font-size:16px}

  #content-screen{padding:20px 14px}
  #content-screen h1{font-size:22px}
  #counter{font-size:12px;padding:6px 14px}

  #msg{
    font-size:14px;
    padding:14px 16px;
    line-height:1.8;
    max-width:100%;
  }

  audio{width:100%;max-width:260px}

  #surp-btn{font-size:14px;padding:10px 22px}
  #surpriseText{font-size:16px}

  #replay-btn{font-size:13px;padding:8px 18px}

  .big-heart{font-size:40px}
}

/* موبايل صغير جداً */
@media (max-width: 400px){
  #count-num{font-size:70px}
  #content-screen h1{font-size:20px}
  #msg{font-size:13px}
}

/* ===== باقي التصميم زي ما هو ===== */

#login-screen{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(160deg,#ffe0ec,#fce4ff,#ffe8f0);
  position:absolute;top:0;left:0;transition:opacity 0.8s,transform 0.8s;
}
#login-screen.hide{opacity:0;transform:scale(1.08);pointer-events:none}
.lock-emoji{font-size:64px;display:block;margin-bottom:18px;animation:beat 1.8s ease-in-out infinite}
#login-screen h2{font-weight:700;color:#9a1f5f;margin-bottom:6px}
#login-screen .sub{color:#c06090;margin-bottom:30px}
.input-row{display:flex;gap:10px;align-items:center;justify-content:center}
#pass{
  padding:12px 20px;border-radius:50px;border:2px solid #f0a0c8;
  outline:none;background:rgba(255,255,255,0.88);
  color:#7a1040;text-align:center;letter-spacing:5px;
  font-family:'Tajawal',sans-serif;
}
#open-btn{
  border-radius:50px;border:none;
  background:#e8609a;color:#fff;font-weight:700;
  cursor:pointer;font-family:'Tajawal',sans-serif;
}

#countdown-screen{
  width:100%;height:100%;display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(160deg,#ffd6e8,#fce4ff,#ffe0ec);
  position:absolute;top:0;left:0;
}
#countdown-screen.show{display:flex}

#content-screen{
  width:100%;height:100%;display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  overflow-y:auto;
  background:linear-gradient(160deg,#ffe0ec,#fce4ff,#ffd6e8);
  position:absolute;top:0;left:0;
  opacity:0;transition:opacity 1s;
}
#content-screen.show{display:flex}
#content-screen.visible{opacity:1}

.big-heart{display:block;margin-bottom:10px;animation:beat 1.5s ease-in-out infinite;cursor:pointer}

#counter{
  color:#b03070;font-weight:700;margin-bottom:18px;
  background:rgba(255,255,255,0.55);
  border-radius:50px;display:inline-block;
}

#msg{
  color:#7a2050;direction:rtl;margin-bottom:20px;
  background:rgba(255,255,255,0.5);
  border-radius:20px;
}

audio{border-radius:40px;outline:none}

#surp-btn{
  border-radius:50px;border:none;
  background:#e8609a;color:#fff;
  font-weight:700;cursor:pointer;
  font-family:'Tajawal',sans-serif;
}

#surpriseText{
  display:none;margin-top:16px;
  color:#8a1550;font-weight:700;direction:rtl;
}

#replay-btn{
  margin-top:6px;border-radius:50px;border:2px solid #e8609a;
  background:transparent;color:#e8609a;
  font-weight:700;cursor:pointer;
  font-family:'Tajawal',sans-serif;display:none;
}
</style>
</head>
<body>

<!-- باقي الكود زي ما هو بدون أي تعديل -->

</body>
</html>
